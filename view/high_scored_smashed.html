<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Typing Speed Test</title>

  <link rel="stylesheet" href="../high_scored_smashed_styles.css">
</head>
<body>

  <main>
    <header>
      <img src="../assets/images/logo-large.svg" alt="">
      <div id="personal-mark-label">
        <img src="../assets/images/icon-personal-best.svg" alt="">
        <p>Personal best:</p>
        <p id="personal-best-score">-- WPM</p>
         <div id="user-section">
          <button id="user-btn">USER_NAME</button>
          <div id="user-sub-menu">
            <ul>
              <li>
                <a id="settings-link">Settings</a>
              </li>
              <li>
                <a id="logout-link">Logout</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <section id="high-scored-smashed-content">
      <img src="../assets/images/icon-new-pb.svg" alt="">
      <h1>High Score Smashed!</h1>
      <p>You're getting faster. That was incredible typing.</p>
      <section class="test-summary-data">
        <div>
          <label for="">WPM: </label>
          <span id="words-per-minute-result">--</span>
        </div>
        <div>
          <label for="">Accuracy: </label>
          <span id="accuracy-result">--%</span>
        </div>
        <div>
          <label for="">Characters: </label>
          <span id="characters-result">--/--</span>
        </div>
      </section>
      <button class="try-again-btn">Beat This Score <img class="button-icon" src="../assets/images/icon-restart.svg" alt=""></button>
      <img src="../assets/images/pattern-confetti.svg" alt="">
    </section>
    
  </main>

  <script src="../src/secundaryElementCreation.js" type="text/javascript"></script>
  <script src="../src/utils.js" type="text/javascript"></script>
  <script src="../src/testComplete.js" type="text/javascript"></script>
</body>
</html>
